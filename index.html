<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <title>AEK FC on Viber</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #000 40%, #f7c600 40%);
      padding: 20px;
    }

    .card {
      background: rgba(0, 0, 0, 0.85);
      padding: 30px 40px;
      border-radius: 12px;
      text-align: center;
      max-width: 420px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .logo img {
      max-width: 160px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: 1px;
    }

    h2 {
      margin: 0 0 20px;
      font-size: 18px;
      font-weight: normal;
      color: #f7c600;
    }

    .btn {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 999px;
      background: #f7c600;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: 0.2s;
    }

    .btn:hover {
      background: #ffe45c;
      transform: translateY(-2px);
    }

    .note {
      margin-top: 15px;
      font-size: 13px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <img src="https://i.pinimg.com/1200x/bc/98/a2/bc98a2d80b4be0c127d7e46e0e5d0f5e.jpg" alt="AEK FC Logo">
      </div>

      <h1>AEK FC ON VIBER</h1>
      <h2>JOIN THE CHANNEL</h2>

      <a class="btn" href="https://invite.viber.com/?g2=AQA60qN%2F0LC8gFaUQvExcGXLXBy14gYlDmg43fD3wGjCUQ34aEabL0hc3j8iWEfM">
        JOIN NOW
      </a>

      <div class="note">
       AEK FC Viber Channel
      </div>
    </div>
  </div>
</body>
</html>
